<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Chat Notifications</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
            padding: 2rem;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            margin-bottom: 2rem;
            color: #333;
        }
        .notification-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }
        .notification-card.unread {
            border-left: 4px solid #25D366;
            background: #f0fdf4;
        }
        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .customer-name {
            font-weight: bold;
            color: #128C7E;
            font-size: 1.1rem;
        }
        .timestamp {
            color: #999;
            font-size: 0.8rem;
        }
        .customer-email {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }
        .message-text {
            background: #f0f0f0;
            padding: 1rem;
            border-radius: 8px;
            margin: 0.5rem 0;
            color: #333;
        }
        .page-url {
            font-size: 0.8rem;
            color: #8B5CF6;
            margin-bottom: 0.5rem;
            word-break: break-all;
        }
        .reply-btn {
            background: #25D366;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .reply-btn:hover {
            background: #128C7E;
        }
        .mark-read-btn {
            background: #6B7280;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 0.5rem;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 12px;
            color: #999;
        }
        .badge {
            background: #dc3545;
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 12px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fab fa-whatsapp"></i> Chat Notifications <span id="unreadBadge" class="badge" style="display: none;">0</span></h1>
        
        <div id="notificationsList">
            <div class="empty-state">
                <i class="fas fa-comments" style="font-size: 3rem; color: #25D366;"></i>
                <p>No chat messages yet. Customers will appear here when they message.</p>
            </div>
        </div>
    </div>

    <script>
        function loadNotifications() {
            const notifications = JSON.parse(localStorage.getItem('chatNotifications') || '[]');
            const container = document.getElementById('notificationsList');
            const unreadCount = notifications.filter(n => !n.read).length;
            const badge = document.getElementById('unreadBadge');
            
            if (unreadCount > 0) {
                badge.style.display = 'inline-block';
                badge.textContent = unreadCount;
            } else {
                badge.style.display = 'none';
            }
            
            if (notifications.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-comments" style="font-size: 3rem; color: #25D366;"></i>
                        <p>No chat messages yet. Customers will appear here when they message.</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = notifications.map(notif => `
                <div class="notification-card ${notif.read ? '' : 'unread'}" id="notif-${notif.id}">
                    <div class="notification-header">
                        <span class="customer-name">
                            <i class="fas fa-user-circle"></i> ${escapeHtml(notif.customerName)}
                            ${!notif.read ? '<span style="color: #25D366; font-size: 12px;"> ● New</span>' : ''}
                        </span>
                        <span class="timestamp">${new Date(notif.timestamp).toLocaleString()}</span>
                    </div>
                    <div class="customer-email">
                        <i class="fas fa-envelope"></i> ${notif.customerEmail || 'No email (not logged in)'}
                    </div>
                    <div class="page-url">
                        <i class="fas fa-link"></i> ${escapeHtml(notif.url)}
                    </div>
                    <div class="message-text">
                        <strong>💬 Message:</strong><br>
                        "${escapeHtml(notif.message)}"
                    </div>
                    <button class="reply-btn" onclick="replyToCustomer('${notif.customerName}', '${notif.message.replace(/'/g, "\\'")}')">
                        <i class="fab fa-whatsapp"></i> Reply on WhatsApp
                    </button>
                    ${!notif.read ? `<button class="mark-read-btn" onclick="markAsRead(${notif.id})">Mark as Read</button>` : ''}
                </div>
            `).join('');
        }
        
        function replyToCustomer(customerName, message) {
            const whatsappMsg = `Hello ${customerName}! 👋

Thank you for reaching out to EmbroideryClothing!

Regarding your question: "${message.substring(0, 100)}${message.length > 100 ? '...' : ''}"

How can I help you today? 😊`;
            
            const encodedMsg = encodeURIComponent(whatsappMsg);
            window.open(`https://wa.me/${customerName}?text=${encodedMsg}`, '_blank');
        }
        
        function markAsRead(id) {
            const notifications = JSON.parse(localStorage.getItem('chatNotifications') || '[]');
            const index = notifications.findIndex(n => n.id === id);
            if (index !== -1) {
                notifications[index].read = true;
                localStorage.setItem('chatNotifications', JSON.stringify(notifications));
                loadNotifications();
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Auto-refresh every 10 seconds
        loadNotifications();
        setInterval(loadNotifications, 10000);
    </script>
</body>
</html>
